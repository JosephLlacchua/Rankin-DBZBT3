<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ingresar a la Arena — DBZ BT3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="utils/firebase-config.js"></script>
</head>

<body>

    <div class="login-card">
        <div class="auth-logo">⚡ DBZ BT3</div>
        <h2>Ingresar</h2>
        <p class="auth-subtitle">Accede a la arena de combate</p>

        <div class="input-group">
            <label class="input-label" for="userLogin">Nombre de Guerrero</label>
            <input id="userLogin" type="text" placeholder="Tu nombre en el ranking...">
        </div>

        <div class="input-group">
            <label class="input-label" for="passLogin">Contraseña</label>
            <input id="passLogin" type="password" placeholder="••••••••">
        </div>

        <button onclick="intentarLogin()">⚡ ENTRAR A LA ARENA</button>

        <div id="errorMessage" class="error">⚠ Usuario o contraseña incorrectos</div>

        <div class="register-text">
            ¿No tienes una cuenta?<br>
            <a href="registro.html">Regístrate como Guerrero</a>
        </div>

        <a href="index.html" class="back">← Volver al Ranking</a>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
