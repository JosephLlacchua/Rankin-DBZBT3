<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Ranking DBZ BT3</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0d0d0d; color: white; text-align: center; padding-top: 50px; }
        .login-card { background: #1a1a1a; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #FFD700; width: 300px; }
        select, button { width: 100%; padding: 12px; margin-top: 20px; border-radius: 5px; border: none; font-size: 1rem; }
        button { background: #FFD700; color: black; font-weight: bold; cursor: pointer; }
        button:hover { background: #ffcc00; }
        .instruccion { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Identifícate</h2>
        <p class="instruccion">Selecciona tu nombre de la lista de jugadores registrados:</p>
        
        <select id="listaJugadores">
            <option>Cargando jugadores...</option>
        </select>

        <button onclick="guardarSesion()">Entrar al Sistema</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // USA TU MISMA CONFIGURACIÓN DE FIREBASE AQUÍ
        const firebaseConfig = {
            apiKey: "AIzaSyD_eT9VlLk_b1toTcva8w9NwU-FGjrEtEI",
            authDomain: "ranking-dbz-bt3.firebaseapp.com",
            databaseURL: "https://ranking-dbz-bt3-default-rtdb.firebaseio.com",
            projectId: "ranking-dbz-bt3",
            storageBucket: "ranking-dbz-bt3.firebasestorage.app",
            messagingSenderId: "228731370543",
            appId: "1:228731370543:web:ff3e418be283b6387edada"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Cargar jugadores desde tu base de datos actual
        db.ref('players').on('value', snap => {
            const players = snap.val() || [];
            const select = document.getElementById("listaJugadores");
            select.innerHTML = players.map(p => `<option value="${p.name}">${p.name}</option>`).join("");
        });

        function guardarSesion() {
            const nombre = document.getElementById("listaJugadores").value;
            // Guardamos el nombre en la memoria del navegador
            localStorage.setItem("nombre_jugador", nombre);
            alert("¡Bienvenido, " + nombre + "!");
            // Redirigir al ranking o a la sala
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
