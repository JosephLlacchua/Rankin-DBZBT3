<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Ranking DBZ BT3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="utils/firebase-config.js"></script>
</head>

<body>

    <div class="login-card">
        <h2>LOG IN</h2>
        <input id="userLogin" type="text" placeholder="Nombre de Guerrero">
        <input id="passLogin" type="password" placeholder="Contraseña">

        <button onclick="intentarLogin()">ENTRAR A LA ARENA</button>

        <div id="errorMessage" class="error">Usuario o contraseña incorrectos</div>

        <div class="register-text">
            ¿No tienes una cuenta? <br>
            <a href="registro.html">Regístrate ahora</a>
        </div>

        <a href="index.html" class="back">← Volver al Ranking</a>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
