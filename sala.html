<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sala de Batalla - DBZ BT3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: white; margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .player-card { flex: 1; padding: 15px; border-radius: 10px; background: #252525; margin: 5px; border: 2px solid transparent; }
        .mi-tarjeta { border-color: #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .score { font-size: 3rem; font-weight: bold; color: #FFD700; }
        button { cursor: pointer; border: none; border-radius: 5px; font-weight: bold; padding: 10px; transition: 0.2s; }
        input, select { padding: 12px; width: 80%; border-radius: 8px; margin-bottom: 10px; background: #000; color: #fff; border: 1px solid #333; }
        .btn-entrar { background: #FFD700; color: #000; width: 85%; font-size: 1.1rem; }
        .btn-puntos { width: 100%; font-size: 1.5rem; background: #333; color: white; margin-top: 10px; }
        .btn-puntos:disabled { opacity: 0.2; cursor: not-allowed; }
        
        /* Estilos del Chat */
        .chat-area { margin-top: 20px; background: #000; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        #chat-messages { height: 150px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; font-size: 0.9rem; line-height: 1.2; }
        .msg-mio { align-self: flex-end; background: #FFD700; color: #000; }
        .msg-rival { align-self: flex-start; background: #333; color: #fff; }
        .chat-input-area { display: flex; padding: 8px; background: #151515; gap: 5px; }
        .chat-input-area input { flex: 1; margin: 0; padding: 8px; }
    </style>
</head>
<body>

    <div id="room-selector" class="container">
        <h2>⚔️ UNIRSE A BATALLA</h2>
        <input type="text" id="room-name" placeholder="Nombre de la sala">
        <select id="ft-limit">
            <option value="3">First To 3</option>
            <option value="5">First To 5</option>
            <option value="10">First To 10</option>
        </select>
        <button class="btn-entrar" onclick="unirseASala()">ENTRAR</button>
    </div>

    <div id="battle-room" class="container" style="display: none;">
        <h3 id="display-room-id" style="color:#FFD700; margin-top: 0;">-</h3>
        
        <div style="display: flex; justify-content: space-between;">
            <div id="card-p1" class="player-card">
                <h4 id="name-p1">...</h4>
                <div class="score" id="score-p1">0</div>
                <button id="btn-add-p1" class="btn-puntos" onclick="sumarPunto('s1')">+</button>
            </div>
            <div id="card-p2" class="player-card">
                <h4 id="name-p2">...</h4>
                <div class="score" id="score-p2">0</div>
                <button id="btn-add-p2" class="btn-puntos" onclick="sumarPunto('s2')">+</button>
            </div>
        </div>

        <p id="waiting-msg" style="color: #666; font-size: 0.8rem; margin: 10px 0;">Esperando oponente...</p>

        <div class="chat-area">
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escribe..." onkeypress="if(event.key==='Enter') enviarMensaje()">
                <button onclick="enviarMensaje()" style="background:#FFD700; padding: 0 15px;">➤</button>
            </div>
        </div>

        <button onclick="abandonarSala()" style="background: none; color: #ff4444; text-decoration: underline; margin-top: 15px; font-size: 0.8rem;">ABANDONAR SALA</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD_eT9VlLk_b1toTcva8w9NwU-FGjrEtEI",
            authDomain: "ranking-dbz-bt3.firebaseapp.com",
            databaseURL: "https://ranking-dbz-bt3-default-rtdb.firebaseio.com",
            projectId: "ranking-dbz-bt3",
            storageBucket: "ranking-dbz-bt3.firebasestorage.app",
            messagingSenderId: "228731370543",
            appId: "1:228731370543:web:ff3e418be283b6387edada"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let miNombre = localStorage.getItem("logged_user") || "Invitado";
        let salaId = "";
        let miRol = "";
        let finalizado = false;

        function unirseASala() {
            salaId = document.getElementById('room-name').value.trim().toLowerCase();
            if (!salaId) return alert("Ponle un nombre a la sala");
            const ftVal = parseInt(document.getElementById('ft-limit').value);

            const refSala = db.ref('salas/' + salaId);
            refSala.once('value', snap => {
                const data = snap.val();

                if (!data) {
                    miRol = "p1";
                    refSala.set({ p1: miNombre, s1: 0, o1: true, p2: "Esperando...", s2: 0, o2: false, ft: ftVal, activa: true });
                    refSala.onDisconnect().remove(); 
                } else {
                    if (data.p2 === "Esperando..." || data.p2 === miNombre) {
                        miRol = "p2";
                        refSala.update({ p2: miNombre, o2: true });
                        refSala.onDisconnect().cancel(); 
                        db.ref(`salas/${salaId}/${miRol === 'p1' ? 'o1' : 'o2'}`).onDisconnect().set(false);
                    } else {
                        alert("Sala llena");
                        return;
                    }
                }
                iniciar();
            });
        }

        function iniciar() {
            document.getElementById('room-selector').style.display = "none";
            document.getElementById('battle-room').style.display = "block";
            document.getElementById('display-room-id').innerText = "SALA: " + salaId.toUpperCase();

            db.ref('salas/' + salaId).on('value', snap => {
                const data = snap.val();
                if (!data) {
                    window.location.href = 'index.html';
                    return;
                }

                document.getElementById('name-p1').innerText = data.p1;
                document.getElementById('name-p2').innerText = data.p2;
                document.getElementById('score-p1').innerText = data.s1;
                document.getElementById('score-p2').innerText = data.s2;

                const ambosOnline = data.o1 && data.o2;
                document.getElementById('btn-add-p1').disabled = (miRol !== 'p1' || !ambosOnline || !data.activa);
                document.getElementById('btn-add-p2').disabled = (miRol !== 'p2' || !ambosOnline || !data.activa);
                
                document.getElementById('card-p1').classList.toggle('mi-tarjeta', miRol === 'p1');
                document.getElementById('card-p2').classList.toggle('mi-tarjeta', miRol === 'p2');

                if (ambosOnline) {
                    document.getElementById('waiting-msg').innerText = "¡En combate! (FT " + data.ft + ")";
                    db.ref(`salas/${salaId}/${miRol === 'p1' ? 'o1' : 'o2'}`).onDisconnect().set(false);
                }

                // FUNCIÓN DE FINALIZACIÓN (FT)
                if (data.activa && (data.s1 >= data.ft || data.s2 >= data.ft)) {
                    finalizarBatalla(data);
                }
            });

            db.ref('chats/' + salaId).limitToLast(15).on('child_added', snap => {
                const msg = snap.val();
                const div = document.createElement('div');
                div.className = `msg ${msg.user === miNombre ? 'msg-mio' : 'msg-rival'}`;
                div.innerText = msg.text;
                const box = document.getElementById('chat-messages');
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }

        function finalizarBatalla(data) {
            if (finalizado) return;
            finalizado = true;
            
            const ganador = data.s1 >= data.ft ? data.p1 : data.p2;
            document.getElementById('waiting-msg').innerText = "🏆 ¡GANADOR: " + ganador + "!";
            document.getElementById('waiting-msg').style.color = "#FFD700";
            document.getElementById('waiting-msg').style.fontSize = "1.2rem";

            // Desactivar botones en la base de datos
            db.ref('salas/' + salaId).update({ activa: false });

            // Borrar sala después de 5 segundos y salir
            setTimeout(() => {
                db.ref('salas/' + salaId).remove();
                db.ref('chats/' + salaId).remove();
                window.location.href = 'index.html';
            }, 5000);
        }

        function sumarPunto(key) {
            db.ref('salas/' + salaId).child(key).transaction(c => (c || 0) + 1);
        }

        function enviarMensaje() {
            const input = document.getElementById('chat-input');
            if (input.value.trim()) {
                db.ref('chats/' + salaId).push({ user: miNombre, text: input.value });
                input.value = "";
            }
        }

        function abandonarSala() {
            const refSala = db.ref('salas/' + salaId);
            refSala.once('value', snap => {
                const data = snap.val();
                if (!data || data.p2 === "Esperando..." || !data.o2) {
                    refSala.remove();
                    db.ref('chats/' + salaId).remove();
                } else {
                    db.ref(`salas/${salaId}/${miRol === 'p1' ? 'o1' : 'o2'}`).set(false);
                }
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
