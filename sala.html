<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sala de Batalla - DBZ BT3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d0d0d; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .sala-header { margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .duelo-grid { display: flex; justify-content: space-around; align-items: center; margin-top: 20px; }
        .player-card { flex: 1; padding: 15px; border-radius: 10px; background: #252525; margin: 0 10px; border: 2px solid transparent; }
        .mi-tarjeta { border-color: #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .score { font-size: 4rem; font-weight: bold; color: #FFD700; margin: 10px 0; }
        .vs { font-size: 1.5rem; font-weight: bold; color: #555; }
        button { cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-puntos { width: 100%; padding: 15px; font-size: 1.5rem; background: #333; color: white; margin-bottom: 10px; }
        .btn-puntos:hover:not(:disabled) { background: #444; }
        .btn-confirm { width: 100%; padding: 10px; background: #4CAF50; color: white; }
        .btn-confirm:disabled { background: #2e4a2e; color: #888; cursor: not-allowed; }
        .confirmado-status { color: #4CAF50; font-size: 0.8rem; margin-top: 5px; display: none; }
        .status-msg { margin-top: 20px; padding: 15px; border-radius: 5px; font-weight: bold; display: none; }
        .success { background: #1b4332; color: #74c69d; display: block; }
        .error-msg { background: #431b1b; color: #c67474; display: block; margin-top:10px; padding:10px; border-radius:5px; }
        input, select { padding: 10px; width: 60%; border-radius: 5px; border: 1px solid #333; background: #000; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container" id="room-selector">
        <h2>⚔️ Crear o Entrar a Sala</h2>
        <input type="text" id="room-name" placeholder="Nombre de la sala (ej: final-torneo)">
        <br>
        <label>Formato de Batalla:</label><br>
        <select id="ft-limit">
            <option value="3">First To 3 (FT3)</option>
            <option value="5">First To 5 (FT5)</option>
            <option value="7">First To 7 (FT7)</option>
            <option value="10">First To 10 (FT10)</option>
        </select>
        <br>
        <button onclick="unirseASala()" style="background: #FFD700; color: black; padding: 12px; width: 65%;">ENTRAR A BATALLAR</button>
        <p><a href="index.html" style="color: #888; text-decoration: none;">← Volver al Ranking</a></p>
    </div>

    <div class="container" id="battle-room" style="display: none;">
        <div class="sala-header">
            <h3 id="display-room-id">SALA: -</h3>
            <div id="ft-indicator" style="color: #FFD700; font-weight: bold; margin-bottom: 5px;">FT -</div>
            <span id="mi-nombre-display" style="color: #888; font-size: 0.9rem;"></span>
        </div>

        <div class="duelo-grid">
            <div id="card-p1" class="player-card">
                <h4 id="name-p1">Esperando...</h4>
                <div class="score" id="score-p1">0</div>
                <button id="btn-add-p1" class="btn-puntos" onclick="sumarPunto('s1')">+</button>
                <div id="msg-conf-p1" class="confirmado-status">✓ LISTO</div>
            </div>

            <div class="vs">VS</div>

            <div id="card-p2" class="player-card">
                <h4 id="name-p2">Esperando...</h4>
                <div class="score" id="score-p2">0</div>
                <button id="btn-add-p2" class="btn-puntos" onclick="sumarPunto('s2')">+</button>
                <div id="msg-conf-p2" class="confirmado-status">✓ LISTO</div>
            </div>
        </div>

        <div id="global-msg" class="status-msg"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD_eT9VlLk_b1toTcva8w9NwU-FGjrEtEI",
            authDomain: "ranking-dbz-bt3.firebaseapp.com",
            databaseURL: "https://ranking-dbz-bt3-default-rtdb.firebaseio.com",
            projectId: "ranking-dbz-bt3",
            storageBucket: "ranking-dbz-bt3.firebasestorage.app",
            messagingSenderId: "228731370543",
            appId: "1:228731370543:web:ff3e418be283b6387edada"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let miNombre = localStorage.getItem("nombre_jugador");
        let salaId = "";
        let miRol = ""; 
        let yaFinalizado = false;

        if (!miNombre) {
            alert("Debes identificarte primero.");
            window.location.href = 'login.html';
        }

        function unirseASala() {
            salaId = document.getElementById('room-name').value.trim().toLowerCase();
            const ftVal = parseInt(document.getElementById('ft-limit').value);
            if (!salaId) return alert("Escribe un nombre de sala");

            document.getElementById('room-selector').style.display = "none";
            document.getElementById('battle-room').style.display = "block";
            document.getElementById('display-room-id').innerText = "SALA: " + salaId.toUpperCase();
            document.getElementById('mi-nombre-display').innerText = "Jugador: " + miNombre;

            conectarFirebase(ftVal);
        }

        function conectarFirebase(ftLimit) {
            const refSala = db.ref('salas/' + salaId);

            refSala.once('value', snap => {
                const data = snap.val();
                if (!data) {
                    miRol = "p1";
                    refSala.set({ 
                        p1: miNombre, s1: 0, o1: true, 
                        p2: "Esperando...", s2: 0, o2: false, 
                        ft: ftLimit, activa: true 
                    });
                } else {
                    if (data.p1 === miNombre) {
                        miRol = "p1";
                        refSala.update({ o1: true });
                    } else if (data.p2 === "Esperando..." || data.p2 === miNombre) {
                        miRol = "p2";
                        refSala.update({ p2: miNombre, o2: true });
                    } else {
                        alert("Sala llena.");
                        location.reload();
                        return;
                    }
                }
                
                // Configurar presencia (Modo Estricto)
                const presRef = db.ref(`salas/${salaId}/${miRol === 'p1' ? 'o1' : 'o2'}`);
                presRef.onDisconnect().set(false);
                
                escucharCambios();
            });
        }

        function escucharCambios() {
            db.ref('salas/' + salaId).on('value', snap => {
                const data = snap.val();
                if (!data || yaFinalizado) return;

                document.getElementById('name-p1').innerText = data.p1;
                document.getElementById('name-p2').innerText = data.p2;
                document.getElementById('score-p1').innerText = data.s1;
                document.getElementById('score-p2').innerText = data.s2;
                document.getElementById('ft-indicator').innerText = "FIRST TO " + (data.ft || 3);

                document.getElementById('card-p1').classList.toggle('mi-tarjeta', miRol === 'p1');
                document.getElementById('card-p2').classList.toggle('mi-tarjeta', miRol === 'p2');

                // LÓGICA DE BOTONES: Solo activos si ambos están conectados
                const ambosOnline = data.o1 && data.o2;
                document.getElementById('btn-add-p1').disabled = (miRol !== 'p1' || !ambosOnline || !data.activa);
                document.getElementById('btn-add-p2').disabled = (miRol !== 'p2' || !ambosOnline || !data.activa);

                if(!ambosOnline && data.p2 !== "Esperando...") {
                    const msg = document.getElementById('global-msg');
                    msg.innerText = "⚠️ RIVAL DESCONECTADO. ESPERANDO...";
                    msg.className = "status-msg error-msg";
                    msg.style.display = "block";
                    
                    // AUTO-GUARDADO POR DESCONEXIÓN (Si ya hay puntos)
                    if((data.s1 > 0 || data.s2 > 0) && data.activa) {
                        registrarEnHistorial(data, "Finalizado por Desconexión");
                    }
                } else {
                    document.getElementById('global-msg').style.display = "none";
                }

                // FINALIZAR POR LÍMITE DE PUNTOS (FT)
                const limite = data.ft || 3;
                if ((data.s1 >= limite || data.s2 >= limite) && data.activa) {
                    registrarEnHistorial(data, "Victoria FT " + limite);
                }
            });
        }

        function sumarPunto(jugadorKey) {
            db.ref('salas/' + salaId).child(jugadorKey).transaction(c => (c || 0) + 1);
        }

        function registrarEnHistorial(data, motivo) {
            yaFinalizado = true;
            db.ref('salas/' + salaId).update({ activa: false });
            
            const matchData = {
                p1: data.p1,
                p2: data.p2,
                s1: data.s1,
                s2: data.s2,
                fecha: new Date().toLocaleString(),
                tipo: motivo
            };

            db.ref('history').once('value', snap => {
                let history = snap.val() || [];
                if (!Array.isArray(history)) history = Object.values(history); // Compatibilidad
                history.unshift(matchData);
                
                db.ref('history').set(history).then(() => {
                    const msg = document.getElementById('global-msg');
                    msg.innerText = "🏆 " + motivo + " - Marcador: " + data.s1 + " a " + data.s2;
                    msg.className = "status-msg success";
                    msg.style.display = "block";
                });
            });
        }
    </script>
</body>
</html>
