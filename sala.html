<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sala de Duelo Oficial - DBZ BT3</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0d0d0d; color: white; text-align: center; margin: 0; padding: 20px; }
        .match-container { background: #1a1a1a; border: 2px solid #FFD700; border-radius: 15px; display: inline-block; padding: 25px; width: 95%; max-width: 650px; box-shadow: 0 0 25px rgba(255, 215, 0, 0.3); }
        .scoreboard { display: flex; justify-content: space-around; align-items: center; margin: 30px 0; font-size: 4rem; font-weight: bold; }
        .player-box { width: 45%; }
        .player-name { font-size: 1.4rem; color: #FFD700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; overflow: hidden; text-overflow: ellipsis; }
        .ft-label { background: #FFD700; color: black; padding: 6px 20px; border-radius: 20px; font-size: 1.1rem; font-weight: bold; display: inline-block; }
        .btn-score { background: #FFD700; color: black; border: none; padding: 18px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 10px; width: 100%; transition: 0.2s; }
        .btn-score:hover:not(:disabled) { transform: scale(1.05); background: #fff; }
        .btn-score:disabled { background: #333; color: #666; cursor: not-allowed; }
        .status-msg { margin-top: 20px; font-size: 1.1rem; font-weight: bold; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="match-container">
        <div id="ftDisplay" class="ft-label">MODO: FT --</div>
        
        <div class="scoreboard">
            <div class="player-box">
                <div id="nameP1" class="player-name">---</div>
                <div id="scoreP1">0</div>
                <button id="btnP1" class="btn-score" onclick="sumarPunto(1)" disabled>+ PUNTO P1</button>
            </div>
            
            <div style="color: #444; font-size: 1.5rem;">VS</div>
            
            <div class="player-box">
                <div id="nameP2" class="player-name">---</div>
                <div id="scoreP2">0</div>
                <button id="btnP2" class="btn-score" onclick="sumarPunto(2)" disabled>+ PUNTO P2</button>
            </div>
        </div>

        <div id="statusMsg" class="status-msg">Iniciando conexión...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD_eT9VlLk_b1toTcva8w9NwU-FGjrEtEI",
            authDomain: "ranking-dbz-bt3.firebaseapp.com",
            databaseURL: "https://ranking-dbz-bt3-default-rtdb.firebaseio.com",
            projectId: "ranking-dbz-bt3",
            storageBucket: "ranking-dbz-bt3.firebasestorage.app",
            messagingSenderId: "228731370543",
            appId: "1:228731370543:web:ff3e418be283b6387edada"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const roomID = params.get('id');
        const miNombre = localStorage.getItem("nombre_jugador");

        if (!roomID || !miNombre) {
            alert("Acceso denegado. Debes iniciar sesión.");
            window.location.href = 'index.html';
        }

        const roomRef = db.ref(`rooms/${roomID}`);
        let soyP1 = false, soyP2 = false;
        let yaGuardado = false;

        // 1. GESTIÓN DE PRESENCIA (MODO ESTRICTO)
        roomRef.once('value', snap => {
            const sala = snap.val();
            if (!sala) return;

            if (sala.jugador_1 === miNombre) {
                soyP1 = true;
                db.ref(`rooms/${roomID}/onlineP1`).set(true);
                db.ref(`rooms/${roomID}/onlineP1`).onDisconnect().set(false);
            } else if (!sala.jugador_2 || sala.jugador_2 === miNombre) {
                soyP2 = true;
                roomRef.update({ jugador_2: miNombre, onlineP2: true, estado: "jugando" });
                db.ref(`rooms/${roomID}/onlineP2`).onDisconnect().set(false);
            }
        });

        // 2. ESCUCHA EN TIEMPO REAL Y AUTO-GUARDADO
        roomRef.on('value', snap => {
            const sala = snap.val();
            if (!sala) return;

            const p1 = sala.puntosP1 || 0;
            const p2 = sala.puntosP2 || 0;
            const limite = sala.limiteFT || 3;

            // Actualizar Interfaz
            document.getElementById("ftDisplay").innerText = `MODO: FT ${limite}`;
            document.getElementById("nameP1").innerText = sala.jugador_1 || "---";
            document.getElementById("nameP2").innerText = sala.jugador_2 || "Esperando...";
            document.getElementById("scoreP1").innerText = p1;
            document.getElementById("scoreP2").innerText = p2;

            // LÓGICA DE DESCONEXIÓN (MODO ESTRICTO)
            if (sala.estado === "jugando" && (!sala.onlineP1 || !sala.onlineP2)) {
                if ((p1 > 0 || p2 > 0) && !yaGuardado) {
                    yaGuardado = true;
                    guardarEnHistorial(sala, "Finalizado por Desconexión");
                }
                document.getElementById("statusMsg").innerText = "⚠️ CONEXIÓN PERDIDA";
                document.getElementById("statusMsg").style.color = "#ff5252";
            } else if (sala.estado === "terminado") {
                document.getElementById("statusMsg").innerText = "🏆 DUELO FINALIZADO";
                document.getElementById("statusMsg").style.color = "#FFD700";
            } else {
                document.getElementById("statusMsg").innerText = "⚔️ ¡A LUCHAR!";
                document.getElementById("statusMsg").style.color = "#03a9f4";
            }

            // Habilitar botones solo si ambos están online y el duelo sigue activo
            const activo = sala.onlineP1 && sala.onlineP2 && sala.estado === "jugando";
            document.getElementById("btnP1").disabled = !(soyP1 && activo);
            document.getElementById("btnP2").disabled = !(soyP2 && activo);

            // Verificar si alguien llegó al FT
            if ((p1 >= limite || p2 >= limite) && !yaGuardado) {
                yaGuardado = true;
                guardarEnHistorial(sala, "Finalizado (FT)");
            }
        });

        function sumarPunto(jugador) {
            roomRef.once('value', snap => {
                const sala = snap.val();
                let pts1 = sala.puntosP1 || 0;
                let pts2 = sala.puntosP2 || 0;

                if (jugador === 1) pts1++;
                else pts2++;

                roomRef.update({ puntosP1: pts1, puntosP2: pts2 });
            });
        }

        function guardarEnHistorial(sala, motivo) {
            const dataFinal = {
                p1: sala.jugador_1,
                p2: sala.jugador_2 || "Desconocido",
                s1: sala.puntosP1 || 0,
                s2: sala.puntosP2 || 0,
                fecha: Date.now(),
                nota: motivo
            };

            // Enviar a la base de datos central de historial
            db.ref('history').push(dataFinal).then(() => {
                roomRef.update({ estado: "terminado" });
                alert(`Resultado guardado: ${dataFinal.s1} - ${dataFinal.s2} (${motivo})`);
            });
        }
    </script>
</body>
</html>
