<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sala de Batalla + Chat - DBZ BT3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: white; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        
        .sala-header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .duelo-grid { display: flex; justify-content: space-around; align-items: center; }
        .player-card { flex: 1; padding: 15px; border-radius: 10px; background: #252525; margin: 0 5px; border: 2px solid transparent; }
        .mi-tarjeta { border-color: #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .score { font-size: 3.5rem; font-weight: bold; color: #FFD700; }
        
        button { cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-puntos { width: 100%; padding: 10px; font-size: 1.5rem; background: #333; color: white; border: 1px solid #444; }
        .btn-puntos:hover:not(:disabled) { background: #FFD700; color: #000; }
        
        .chat-area { margin-top: 25px; background: #000; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .chat-header { background: #222; padding: 8px; font-size: 0.8rem; color: #FFD700; text-transform: uppercase; border-bottom: 1px solid #333; }
        #chat-messages { height: 180px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; font-size: 0.9rem; line-height: 1.3; }
        .msg-mio { align-self: flex-end; background: #FFD700; color: #000; border-bottom-right-radius: 2px; }
        .msg-rival { align-self: flex-start; background: #333; color: #fff; border-bottom-left-radius: 2px; }
        .msg-info { align-self: center; font-size: 0.7rem; color: #666; font-style: italic; }
        .chat-input-area { display: flex; padding: 10px; background: #151515; gap: 5px; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; }
        .btn-send { background: #FFD700; color: #000; padding: 0 15px; }

        .status-msg { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; font-weight: bold; }
        .success { background: #1b4332; color: #74c69d; }
        input[type="text"], select { padding: 12px; width: 80%; border-radius: 8px; margin-bottom: 15px; background: #000; color: #fff; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="container" id="room-selector">
        <h2>⚔️ SALA DE BATALLA</h2>
        <input type="text" id="room-name" placeholder="Nombre de la sala">
        <br>
        <label>Selecciona Formato:</label><br>
        <select id="ft-limit">
            <option value="3">First To 3 (FT3)</option>
            <option value="5">First To 5 (FT5)</option>
            <option value="7">First To 7 (FT7)</option>
            <option value="10">First To 10 (FT10)</option>
        </select>
        <br>
        <button onclick="unirseASala()" style="background:#FFD700; color:#000; padding:15px; width:85%; font-size:1.1rem;">ENTRAR</button>
    </div>

    <div class="container" id="battle-room" style="display: none;">
        <div class="sala-header">
            <h3 id="display-room-id" style="margin:0; color:#FFD700;">-</h3>
            <small id="ft-indicator" style="color:#888;">FT -</small>
        </div>

        <div class="duelo-grid">
            <div id="card-p1" class="player-card">
                <h4 id="name-p1" style="margin:0 0 10px 0; font-size:0.9rem;">...</h4>
                <div class="score" id="score-p1">0</div>
                <button id="btn-add-p1" class="btn-puntos" onclick="sumarPunto('s1')">+</button>
            </div>
            <div style="font-weight:bold; color:#444;">VS</div>
            <div id="card-p2" class="player-card">
                <h4 id="name-p2" style="margin:0 0 10px 0; font-size:0.9rem;">...</h4>
                <div class="score" id="score-p2">0</div>
                <button id="btn-add-p2" class="btn-puntos" onclick="sumarPunto('s2')">+</button>
            </div>
        </div>

        <div id="global-msg" class="status-msg"></div>

        <div class="chat-area">
            <div class="chat-header">Chat de la Sala</div>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') enviarMensaje()">
                <button class="btn-send" onclick="enviarMensaje()">➤</button>
            </div>
        </div>

        <button onclick="location.href='index.html'" style="margin-top:15px; background:none; color:#555; font-size:0.8rem;">Abandonar Sala</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD_eT9VlLk_b1toTcva8w9NwU-FGjrEtEI",
            authDomain: "ranking-dbz-bt3.firebaseapp.com",
            databaseURL: "https://ranking-dbz-bt3-default-rtdb.firebaseio.com",
            projectId: "ranking-dbz-bt3",
            storageBucket: "ranking-dbz-bt3.firebasestorage.app",
            messagingSenderId: "228731370543",
            appId: "1:228731370543:web:ff3e418be283b6387edada"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let miNombre = localStorage.getItem("logged_user");
        let salaId = "";
        let miRol = ""; 
        let yaFinalizado = false;

        if (!miNombre) window.location.href = 'login.html';

        function unirseASala() {
            salaId = document.getElementById('room-name').value.trim().toLowerCase();
            const ftVal = parseInt(document.getElementById('ft-limit').value);
            if (!salaId) return alert("Escribe un nombre para la sala");

            document.getElementById('room-selector').style.display = "none";
            document.getElementById('battle-room').style.display = "block";
            document.getElementById('display-room-id').innerText = "SALA: " + salaId.toUpperCase();

            conectar(ftVal);
        }

        function conectar(ftLimit) {
            const refSala = db.ref('salas/' + salaId);
            refSala.once('value', snap => {
                const data = snap.val();
                if (!data) {
                    miRol = "p1";
                    refSala.set({ p1: miNombre, s1: 0, o1: true, p2: "Esperando...", s2: 0, o2: false, ft: ftLimit, activa: true });
                } else {
                    if (data.p1 === miNombre) { miRol = "p1"; refSala.update({ o1: true }); }
                    else if (data.p2 === "Esperando..." || data.p2 === miNombre) { miRol = "p2"; refSala.update({ p2: miNombre, o2: true }); }
                    else { alert("Sala llena"); location.reload(); return; }
                }
                db.ref(`salas/${salaId}/${miRol === 'p1' ? 'o1' : 'o2'}`).onDisconnect().set(false);
                escuchar();
            });
        }

        function escuchar() {
            db.ref('salas/' + salaId).on('value', snap => {
                const data = snap.val();
                if (!data || yaFinalizado) return;

                document.getElementById('name-p1').innerText = data.p1;
                document.getElementById('name-p2').innerText = data.p2;
                document.getElementById('score-p1').innerText = data.s1;
                document.getElementById('score-p2').innerText = data.s2;
                document.getElementById('ft-indicator').innerText = "FIRST TO " + (data.ft || 3);

                document.getElementById('card-p1').classList.toggle('mi-tarjeta', miRol === 'p1');
                document.getElementById('card-p2').classList.toggle('mi-tarjeta', miRol === 'p2');

                const ambosOk = data.o1 && data.o2;
                document.getElementById('btn-add-p1').disabled = (miRol !== 'p1' || !ambosOk || !data.activa);
                document.getElementById('btn-add-p2').disabled = (miRol !== 'p2' || !ambosOk || !data.activa);

                if ((data.s1 >= data.ft || data.s2 >= data.ft) && data.activa) finalizar(data);
            });

            db.ref('chats/' + salaId).limitToLast(20).on('child_added', snap => {
                const msg = snap.val();
                const div = document.createElement('div');
                div.className = `msg ${msg.user === miNombre ? 'msg-mio' : 'msg-rival'}`;
                if(msg.type === 'system') div.className = 'msg-info';
                
                div.innerText = msg.text;
                const box = document.getElementById('chat-messages');
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }

        function enviarMensaje() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            db.ref('chats/' + salaId).push({
                user: miNombre,
                text: text,
                time: Date.now()
            });
            input.value = "";
        }

        function sumarPunto(key) {
            db.ref('salas/' + salaId).child(key).transaction(c => (c || 0) + 1);
            db.ref('chats/' + salaId).push({ type: 'system', text: `${miNombre} anotó un punto` });
        }

        async function finalizar(data) {
            yaFinalizado = true;
            await db.ref('salas/' + salaId).update({ activa: false });

            const s1 = data.s1, s2 = data.s2;
            const winnerName = s1 > s2 ? data.p1 : data.p2;
            const loserName = s1 > s2 ? data.p2 : data.p1;
            const diff = Math.abs(s1 - s2);
            const puntosW = 20 + (diff * 2);
            const puntosL = 15 + (diff * 2);

            const pSnap = await db.ref('players').once('value');
            let players = pSnap.val() || [];
            players = players.map(p => {
                if(p.name === winnerName) { 
                    p.elo = (p.elo || 500) + puntosW; 
                    p.wins = (p.wins || 0) + 1; 
                    p.streak = p.streak > 0 ? p.streak + 1 : 1; 
                }
                if(p.name === loserName) { 
                    p.elo = Math.max(0, (p.elo || 500) - puntosL); 
                    p.losses = (p.losses || 0) + 1; 
                    p.streak = p.streak < 0 ? p.streak - 1 : -1; 
                }
                return p;
            });

            const hSnap = await db.ref('history').once('value');
            let history = hSnap.val() || [];
            if (!Array.isArray(history)) history = Object.values(history);
            history.unshift({ p1: data.p1, p2: data.p2, s1: s1, s2: s2, fecha: new Date().toLocaleString() });

            await db.ref('players').set(players);
            await db.ref('history').set(history);
            
            setTimeout(() => db.ref('chats/' + salaId).remove(), 10000);

            const msgBox = document.getElementById('global-msg');
            msgBox.innerText = "🏆 ¡VICTORIA PARA " + winnerName.toUpperCase() + "!";
            msgBox.className = "status-msg success";
            msgBox.style.display = "block";
        }
    </script>
</body>
</html>
