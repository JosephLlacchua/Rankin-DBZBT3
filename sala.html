<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sala de Batalla — DBZ BT3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/sala.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="utils/firebase-config.js"></script>
</head>

<body>

    <!-- Winner Overlay -->
    <div id="winner-overlay">
        <div class="winner-box">
            <div id="res-title">🏆 RESULTADO FINAL</div>
            <div id="winner-name">-</div>
            <p id="winner-msg">Actualizando el Ranking Global...</p>
        </div>
    </div>

    <!-- Room Selector -->
    <div id="room-selector" class="container">
        <h2>⚔️ Panel de Batalla</h2>

        <div class="setup-box">
            <p>Configurar Batalla — Solo Host</p>
            <select id="ft-limit">
                <option value="3">First To 3</option>
                <option value="5">First To 5</option>
                <option value="10">First To 10</option>
            </select>
            <button class="btn-entrar" onclick="crearSala()">🔥 CREAR NUEVA SALA</button>
        </div>

        <input type="text" id="room-id-input" placeholder="Pegar ID de Sala para unirte">
        <button class="btn-join" onclick="unirseASala()">⚡ UNIRSE A BATALLA</button>
    </div>

    <!-- Battle Room -->
    <div id="battle-room" class="container" style="display: none;">
        <small style="color: var(--text-muted); font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; display: block; text-align: center;">ID de Sala — Toca para copiar</small>
        <button id="display-room-id" onclick="copiarID()">-</button>

        <div class="players-row">
            <div class="player-card">
                <h4 id="name-p1">P1</h4>
                <div class="score" id="score-p1">0</div>
                <button id="add-p1-plus" class="btn-puntos" onclick="sumarPunto('s1')">＋</button>
                <button id="add-p1-minus" class="btn-puntos" onclick="restarPunto('s1')">－</button>
            </div>
            <div class="player-card">
                <h4 id="name-p2">P2</h4>
                <div class="score" id="score-p2">0</div>
                <button id="add-p2-plus" class="btn-puntos" onclick="sumarPunto('s2')">＋</button>
                <button id="add-p2-minus" class="btn-puntos" onclick="restarPunto('s2')">－</button>
            </div>
        </div>

        <div id="status-bar">
            <p id="status-msg">Esperando oponente...</p>
        </div>

        <button onclick="abandonarSala()" class="btn-abandon">Abandonar / Finalizar Pelea</button>
    </div>

    <script src="js/sala.js"></script>
</body>

</html>
