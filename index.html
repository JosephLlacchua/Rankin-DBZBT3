<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ranking DBZ BT3 - Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    /* Estilos originales de tu Ranking */
    body { font-family: Arial, sans-serif; background: url('imagenes/goku wallp.jpg') no-repeat center center fixed; background-size: cover; color:#fff; padding:10px; margin:0; position: relative; z-index: 1; }
    body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: -1; }
    h1 { text-align:center; margin-bottom:20px; }
    .table-container { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    th,td { padding:8px 6px; border-bottom:1px solid #333; text-align:center; }
    .player-link { color: #fff; font-weight: bold; text-transform: uppercase; cursor: pointer; }
    .player-flag { width: 20px; height: 14px; display: block; margin: auto; border-radius: 2px; }
    .rank-S { color:#FFD700; font-weight:bold; } .rank-A { color:#FF5252; font-weight:bold; }
    .rank-B { color:#4CAF50; font-weight:bold; } .rank-C { color:#03A9F4; font-weight:bold; }
    .rank-D { color:#BDBDBD; font-weight:bold; } .rank-E { color:#9E9E9E; font-weight:bold; }
    .progress { background:#333; height:6px; border-radius:6px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#4caf50,#81c784); }
</style>
</head>
<body>

<h1>🔥 RANKING DBZ BT3 LIVE 🔥</h1>

<div class="table-container">
<table>
<thead>
  <tr><th>#</th><th>🌐</th><th>Jugador</th><th>Rango</th><th>ELO</th><th>Progreso</th><th>🏆 W</th><th>💀 L</th></tr>
</thead>
<tbody id="ranking"></tbody>
</table>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD_eT9VlLk_b1toTcva8w9NwU-FGjrEtEI",
  authDomain: "ranking-dbz-bt3.firebaseapp.com",
  databaseURL: "https://ranking-dbz-bt3-default-rtdb.firebaseio.com",
  projectId: "ranking-dbz-bt3",
  storageBucket: "ranking-dbz-bt3.firebasestorage.app",
  messagingSenderId: "228731370543",
  appId: "1:228731370543:web:ff3e418be283b6387edada"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ranks=[
  {name:"E",min:0,max:699,class:"rank-E"},
  {name:"D",min:700,max:999,class:"rank-D"},
  {name:"C",min:1000,max:1299,class:"rank-C"},
  {name:"B",min:1300,max:1599,class:"rank-B"},
  {name:"A",min:1600,max:1899,class:"rank-A"},
  {name:"S",min:1900,max:Infinity,class:"rank-S"}
];

db.ref('/').on('value', (snapshot) => {
    const data = snapshot.val();
    const players = data?.players || [];
    render(players);
});

function getRank(e){ return ranks.find(r=>e>=r.min&&e<=r.max) || ranks[0]; }
function getProgress(e,r){ return r.name==="S"?100:Math.max(0,Math.min(100,((e-r.min)/(r.max-r.min))*100)); }

function render(playersList){
    const rankingEl=document.getElementById('ranking');
    rankingEl.innerHTML="";
    const ordenados = [...playersList].sort((a,b)=>b.elo-a.elo);

    ordenados.forEach((p, i)=>{
        const r=getRank(p.elo);
        const banderas = {"ARGENTINA":"bandera argentina.png","PERÚ":"bandera peru.png","PARAGUAY":"bandera paraguay.png","CHILE":"bandera chile.png","URUGUAY":"bandera uruguay.png"};
        const banderaImg = p.country && banderas[p.country] ? `<img src="imagenes/${banderas[p.country]}" class="player-flag">` : "";

        rankingEl.innerHTML += `
            <tr>
              <td>${i+1}</td>
              <td>${banderaImg}</td>
              <td><span class="player-link">${p.name}</span></td>
              <td class="${r.class}">${r.name}</td>
              <td>${Math.round(p.elo)}</td>
              <td><div class="progress"><div class="progress-fill" style="width:${getProgress(p.elo,r)}%"></div></div></td>
              <td>${p.wins}</td>
              <td>${p.losses}</td>
            </tr>`;
    });
}
</script>
</body>
</html>
