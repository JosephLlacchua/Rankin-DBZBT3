<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ranking DBZ BT3</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
/* Ajuste para que el fondo se vea bien en celulares */
@media (max-width: 768px) {
    body {
        /* Centramos la imagen para que lo más importante quede en el medio */
        background-position: center center;
        
        /* 'contain' hace que la imagen se vea completa sin cortarse, 
           pero 'cover' con ajustes suele ser mejor para no dejar espacios negros */
        background-attachment: scroll; /* Mejora el rendimiento en móviles */
    }
}

    
body { font-family: Arial, sans-serif; background: url('Imagenes/goku wallp.jpg') no-repeat center center fixed; background-size: cover; color:#fff; padding:10px; margin:0; position: relative; z-index: 1; }
body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: -1; }
h1 { text-align:center; margin-bottom:20px; }
.table-container { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; box-shadow: 0 0 12px rgba(0,0,0,0.4); overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:0.9rem; }
th,td { padding:8px 6px; border-bottom:1px solid #333; text-align:center; }
th { background:#222; }
table th:nth-child(1), table td:nth-child(1), table th:nth-child(2), table td:nth-child(2) { width: 40px; text-align: center; }
table th:nth-child(3), table td:nth-child(3) { text-align: left; padding-left: 15px; }
.player-link { background: linear-gradient(90deg, #ffffff, #ffffff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: transform 0.3s ease; display: inline-block; }
.player-link:hover { transform: scale(1.05); text-shadow: 0 0 10px #FFD700; }
.player-flag { width: 20px; height: 14px; object-fit: cover; display: block; margin: auto; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 2px; }
.highlight { background:rgba(255,215,0,0.2); font-weight:bold; }
.rank-S { color:#FFD700; font-weight:bold; }
.rank-A { color:#FF5252; font-weight:bold; }
.rank-B { color:#4CAF50; font-weight:bold; }
.rank-C { color:#03A9F4; font-weight:bold; }
.rank-D { color:#BDBDBD; font-weight:bold; }
.rank-E { color:#9E9E9E; font-weight:bold; }
.progress { background:#333; height:6px; border-radius:6px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#4caf50,#81c784); }
.modal { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; z-index: 1000; }
.hidden { display:none; }
.modal-content { background:#1e1e1e; padding:15px; border-radius:12px; width:90%; max-width:500px; color: white; }
canvas { background:#111; border-radius:8px; margin-top:10px; }
.pagination { text-align:center; margin-top:15px; }
.pagination button { width:40px; height:40px; border-radius:50%; border:2px solid #FFD700; background:#111; color:#FFD700; font-weight:bold; cursor:pointer; margin:0 5px; transition:all 0.3s ease; }
.pagination button:hover { background:#FFD700; color:#111; box-shadow:0 0 12px #FFD700; transform:scale(1.1); }
.pagination button.active { background:#FFD700; color:#111; box-shadow:0 0 15px #FFD700; }
#searchRanking { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: none; background: #222; color: white; }
</style>
</head>
<body>

<h1>🔥 Ranking DBZ BT3 🔥</h1>

<input id="searchRanking" list="playerList" placeholder="Buscar jugador en ranking...">
<datalist id="playerList"></datalist>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>🌐</th>
                <th>Jugador</th>
                <th>Rango</th>
                <th>ELO</th>
                <th>Progreso</th>
                <th>🏆 W</th>
                <th>💀 L</th>
                <th>Racha</th>
            </tr>
        </thead>
        <tbody id="ranking"></tbody>
    </table>
</div>

<div class="pagination" id="pagination"></div>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalTitle" style="text-align:center"></h3>
    <div id="modalStats"></div>
    <canvas id="eloChart" width="400" height="200"></canvas>
    <hr>
    <ul id="modalHistory" style="max-height: 100px; overflow-y: auto; font-size: 0.8rem;"></ul>
    <button onclick="closeModal()" style="width:100%; padding:10px; cursor:pointer; background: #444; color: white; border: none; border-radius: 8px;">Cerrar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD_eT9VlLk_b1toTcva8w9NwU-FGjrEtEI",
  authDomain: "ranking-dbz-bt3.firebaseapp.com",
  databaseURL: "https://ranking-dbz-bt3-default-rtdb.firebaseio.com",
  projectId: "ranking-dbz-bt3",
  storageBucket: "ranking-dbz-bt3.firebasestorage.app",
  messagingSenderId: "228731370543",
  appId: "1:228731370543:web:ff3e418be283b6387edada"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players=[], history=[];
const PAGE_SIZE=10;
let currentPage=1;
let filteredList=[];
let chartInstance=null;

const countryByName = { "DARK": "ARGENTINA", "ETR-FASTEK": "ARGENTINA", "ETR-MICKY": "ARGENTINA", "MILANCO": "ARGENTINA", "KEVON": "ARGENTINA", "MORATO": "ARGENTINA", "ETR-JYX": "ARGENTINA", "ANDY-PEREZ": "ARGENTINA", "CHINCHANO": "PERÚ", "EMANUEL09": "PERÚ", "ETR-NOVAK": "ARGENTINA", "JNC": "PARAGUAY", "BRIAN-TNK": "ARGENTINA", "MAX-FARO": "ARGENTINA", "ALEXANDER": "ARGENTINA" };

function getBanderaHTML(country){
  if(!country) return "";
  const banderas = { "ARGENTINA": "bandera argentina.png", "PERÚ": "bandera peru.png", "PARAGUAY": "bandera paraguay.png", "CHILE": "bandera chile.png", "URUGUAY": "bandera uruguay.png" };
  return banderas[country.toUpperCase()] ? `<img src="Imagenes/${banderas[country.toUpperCase()]}" class="player-flag">` : "";
}

const ranks=[ {name:"E",min:0,max:699,class:"rank-E"}, {name:"D",min:700,max:999,class:"rank-D"}, {name:"C",min:1000,max:1299,class:"rank-C"}, {name:"B",min:1300,max:1599,class:"rank-B"}, {name:"A",min:1600,max:1899,class:"rank-A"}, {name:"S",min:1900,max:Infinity,class:"rank-S"} ];
function getRank(e){ return ranks.find(r=>e>=r.min&&e<=r.max); }
function getProgress(e,r){ return r.name==="S"?100:Math.max(0,Math.min(100,((e-r.min)/(r.max-r.min))*100)); }

db.ref('/').on('value', snapshot => {
  const d = snapshot.val();
  players = d?.players || [];
  history = d?.history || [];
  players = players.map(p => ({ ...p, country: p.country || countryByName[p.name] || null }));
  render();
});

function render(){
  const rankingEl=document.getElementById('ranking');
  rankingEl.innerHTML="";
  const ordenados=[...players].sort((a,b)=>b.elo-a.elo);
  const filtro=(document.getElementById('searchRanking')?.value||"").toLowerCase();
  filteredList=ordenados.filter(p=>p.name.toLowerCase().includes(filtro));
  const start=(currentPage-1)*PAGE_SIZE;
  const pagePlayers=filteredList.slice(start,start+PAGE_SIZE);

  pagePlayers.forEach(p=>{
    const r=getRank(p.elo);
    const streak=p.streak>0?'🔥 '+p.streak:p.streak<0?'💀 '+Math.abs(p.streak):'-';
    const row=document.createElement("tr");
    if(filtro && p.name.toLowerCase().includes(filtro)) row.className="highlight";
    row.innerHTML=`
      <td>${ordenados.indexOf(p)+1}</td>
      <td>${getBanderaHTML(p.country)}</td>
      <td><span class="player-link" onclick="openModal('${p.name}')">${p.name}</span></td>
      <td class="${r.class}">${r.name}</td>
      <td>${Math.round(p.elo)}</td>
      <td><div class="progress"><div class="progress-fill" style="width:${getProgress(p.elo,r)}%"></div></div></td>
      <td>${p.wins}</td>
      <td>${p.losses}</td>
      <td>${streak}</td>`;
    rankingEl.appendChild(row);
  });
  renderPagination();
  renderDatalist();
}

function renderPagination(){
  const paginationEl=document.getElementById('pagination');
  const totalPages=Math.ceil(filteredList.length/PAGE_SIZE);
  paginationEl.innerHTML="";
  if(totalPages <= 1) return;
  for(let i=1;i<=totalPages;i++){
    const btn=document.createElement("button");
    btn.textContent=i;
    if(i===currentPage) btn.classList.add("active");
    btn.onclick=()=>{ currentPage=i; render(); };
    paginationEl.appendChild(btn);
  }
}

function renderDatalist(){
  const list=document.getElementById("playerList");
  list.innerHTML=players.map(p=>`<option value="${p.name}">`).join("");
}

function buildEloTimeline(name){
  const eloMap=new Map(players.map(p=>[p.name,500]));
  const timeline=[];
  [...history].reverse().forEach(h=>{
    const A=h.p1, B=h.p2, s1=h.s1, s2=h.s2;
    const diff=Math.abs(s1-s2);
    const winner=s1>s2?A:B; const loser=s1>s2?B:A;
    if(eloMap.has(winner)) eloMap.set(winner, eloMap.get(winner)+(20+diff*2));
    if(eloMap.has(loser)) eloMap.set(loser, Math.max(0,eloMap.get(loser)-(15+diff*2)));
    if(A===name || B===name) timeline.push({label:`vs ${A===name?B:A}`, elo: Math.round(eloMap.get(name))});
  });
  return timeline.length ? timeline : [{label:'Inicio', elo: 500}];
}

    function openModal(name) {
      const modal = document.getElementById('modal');
      const modalTitle = document.getElementById('modalTitle');
      const modalStats = document.getElementById('modalStats');
      const modalHistory = document.getElementById('modalHistory');
      const p = players.find(x => x.name === name);
      if (!p) return;

      const banderaHTML = getBanderaHTML(p.country);
      modalTitle.innerHTML = `<div style="display:flex; align-items:center; justify-content:center;">${banderaHTML} <span style="margin-left:10px;">${name}</span></div>`;

      modalStats.innerHTML = `
    <b>ELO:</b> ${Math.round(p.elo)}<br>
    <b>Victorias:</b> ${p.wins}<br>
    <b>Derrotas:</b> ${p.losses}<br>
    <b>Racha:</b> ${p.streak > 0 ? '🔥 ' + p.streak : p.streak < 0 ? '💀 ' + Math.abs(p.streak) : '-'}
  `;

      const list = history.filter(h => h.p1 === name || h.p2 === name);
      modalHistory.innerHTML = list.length
        ? list.map(h => {
          const p1win = h.s1 > h.s2;
          const youAreP1 = h.p1 === name;
          const youWon = (youAreP1 && p1win) || (!youAreP1 && !p1win);
          const icon = youWon ? '🔥' : '💀';
          return `<li role="listitem">${icon} ${h.p1} ${h.s1} – ${h.s2} ${h.p2}</li>`;
        }).join("")
        : "<i>Sin historial</i>";

      const data = buildEloTimeline(name);
      const ctx = document.getElementById('eloChart').getContext('2d');
      if (chartInstance) { chartInstance.destroy(); }
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map(d => d.label),
          datasets: [{
            label: 'Evolución de ELO',
            data: data.map(d => d.elo),
            borderColor: '#03a9f4',
            backgroundColor: 'rgba(3,169,244,0.2)',
            tension: 0.25,
            fill: true,
            pointRadius: 3,
            pointBackgroundColor: '#FFD700'
          }]
        },
        options: {
          plugins: { legend: { labels: { color: '#fff' } } },
          scales: {
            x: { ticks: { color: '#ccc' }, grid: { color: 'rgba(255,255,255,0.1)' } },
            y: { ticks: { color: '#ccc' }, grid: { color: 'rgba(255,255,255,0.1)' } }
          }
        }
      });

      modal.classList.remove("hidden");
      modal.onclick = e => { if (e.target === modal) closeModal(); };
      document.onkeydown = e => { if (e.key === "Escape") closeModal(); };
    }

 function closeModal() {document.getElementById('modal').classList.add("hidden");}
document.getElementById('searchRanking').addEventListener('input', ()=>{ currentPage=1; render(); });
</script>
</body>
</html>
