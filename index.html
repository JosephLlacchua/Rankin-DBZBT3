<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking DBZ BT3 - Oficial</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background: url('Imagenes/goku wallp.jpg') no-repeat center center fixed; background-size: cover; color:#fff; padding:10px; margin:0; position: relative; z-index: 1; }
        body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: -1; }
        h1 { text-align:center; margin-bottom:20px; text-shadow: 0 0 10px #FFD700; }
        .table-container { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; box-shadow: 0 0 12px rgba(0,0,0,0.4); overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:0.9rem; }
        th,td { padding:8px 6px; border-bottom:1px solid #333; text-align:center; }
        th { background:#222; }
        .player-link { background: linear-gradient(90deg, #ffffff, #ffffff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: transform 0.2s ease; display: inline-block; }
        .player-link:hover { transform: scale(1.1); text-shadow: 0 0 10px #FFD700; }
        .player-flag { width: 24px; height: 16px; object-fit: cover; vertical-align: middle; border-radius: 2px; }
        .rank-S { color:#FFD700; font-weight:bold; }
        .rank-A { color:#FF5252; font-weight:bold; }
        .rank-B { color:#4CAF50; font-weight:bold; }
        .rank-C { color:#03A9F4; font-weight:bold; }
        .rank-D { color:#BDBDBD; font-weight:bold; }
        .rank-E { color:#9E9E9E; font-weight:bold; }
        .progress { background:#333; height:8px; border-radius:6px; overflow:hidden; min-width: 60px; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#4caf50,#81c784); transition: width 0.5s ease; }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; z-index: 1000; }
        .hidden { display:none; }
        .modal-content { background:#1a1a1a; padding:20px; border-radius:15px; width:90%; max-width:450px; border: 1px solid #333; }
        #searchRanking { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        .pagination { text-align:center; margin-top:15px; }
        .pagination button { width:35px; height:35px; border-radius:50%; border:1px solid #FFD700; background:#111; color:#FFD700; cursor:pointer; margin:0 3px; }
        .pagination button.active { background:#FFD700; color:#111; }
    </style>
</head>
<body>

<h1>🔥 Ranking DBZ BT3 🔥</h1>

<input id="searchRanking" placeholder="Buscar guerrero...">

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>🌐</th>
                <th>Jugador</th>
                <th>Rango</th>
                <th>ELO</th>
                <th>Progreso</th>
                <th>🏆 W</th>
                <th>💀 L</th>
                <th>Racha</th>
            </tr>
        </thead>
        <tbody id="ranking"></tbody>
    </table>
</div>

<div class="pagination" id="pagination"></div>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle" style="text-align:center; margin-top:0;"></h2>
    <div id="modalStats" style="text-align:center; background:#222; padding:10px; border-radius:8px; margin-bottom:10px;"></div>
    
    <canvas id="eloChart" width="400" height="220"></canvas>
    
    <h4 style="margin:15px 0 5px 0; border-bottom:1px solid #333;">Últimas 10 batallas:</h4>
    <ul id="modalHistory" style="max-height: 120px; overflow-y: auto; font-size: 0.85rem; list-style: none; padding: 0;"></ul>
    
    <button onclick="closeModal()" style="width:100%; padding:12px; margin-top:15px; cursor:pointer; background: #d32f2f; color: white; border: none; border-radius: 8px; font-weight: bold;">Cerrar Panel</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// CONFIGURACIÓN FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyD_eT9VlLk_b1toTcva8w9NwU-FGjrEtEI",
  authDomain: "ranking-dbz-bt3.firebaseapp.com",
  databaseURL: "https://ranking-dbz-bt3-default-rtdb.firebaseio.com",
  projectId: "ranking-dbz-bt3",
  storageBucket: "ranking-dbz-bt3.firebasestorage.app",
  messagingSenderId: "228731370543",
  appId: "1:228731370543:web:ff3e418be283b6387edada"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = [], history = [];
let currentPage = 1;
const PAGE_SIZE = 10;
let chartInstance = null;

function getBanderaHTML(country){
  if(!country) return "❓";
  const banderas = { 
    "ARGENTINA": "bandera argentina.png", 
    "PERÚ": "bandera peru.png", 
    "PARAGUAY": "bandera paraguay.png", 
    "CHILE": "bandera chile.png", 
    "URUGUAY": "bandera uruguay.png" 
  };
  const file = banderas[country.toUpperCase()];
  return file ? `<img src="Imagenes/${file}" class="player-flag">` : "❓";
}

const ranks = [
  {name:"E",min:0,max:699,class:"rank-E"},
  {name:"D",min:700,max:999,class:"rank-D"},
  {name:"C",min:1000,max:1299,class:"rank-C"},
  {name:"B",min:1300,max:1599,class:"rank-B"},
  {name:"A",min:1600,max:1899,class:"rank-A"},
  {name:"S",min:1900,max:9999,class:"rank-S"}
];

function getRank(e){ return ranks.find(r=>e>=r.min&&e<=r.max) || ranks[0]; }

db.ref('/').on('value', snap => {
  const d = snap.val();
  if(d){
    players = d.players || [];
    history = d.history || [];
    render();
  }
});

function render(){
  const container = document.getElementById('ranking');
  container.innerHTML = "";
  const filtered = players.filter(p => p.name.toLowerCase().includes(document.getElementById('searchRanking').value.toLowerCase()));
  const sorted = filtered.sort((a,b) => b.elo - a.elo);
  
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = sorted.slice(start, start + PAGE_SIZE);

  pageItems.forEach((p, i) => {
    const r = getRank(p.elo);
    const progress = r.name === "S" ? 100 : ((p.elo - r.min) / (r.max - r.min)) * 100;
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${start + i + 1}</td>
      <td>${getBanderaHTML(p.country)}</td>
      <td><span class="player-link" onclick="openModal('${p.name}')">${p.name}</span></td>
      <td class="${r.class}">${r.name}</td>
      <td>${Math.round(p.elo)}</td>
      <td><div class="progress"><div class="progress-fill" style="width:${progress}%"></div></div></td>
      <td>${p.wins}</td>
      <td>${p.losses}</td>
      <td>${p.streak > 0 ? '🔥 '+p.streak : p.streak < 0 ? '💀 '+Math.abs(p.streak) : '-'}</td>
    `;
    container.appendChild(row);
  });
  renderPagination(sorted.length);
}

function openModal(name) {
  const p = players.find(x => x.name === name);
  if (!p) return;

  document.getElementById('modalTitle').innerHTML = `${getBanderaHTML(p.country)} ${name}`;
  document.getElementById('modalStats').innerHTML = `
    <b>ELO:</b> ${Math.round(p.elo)} | <b>W:</b> ${p.wins} | <b>L:</b> ${p.losses} | <b>Racha:</b> ${p.streak > 0 ? '🔥 '+p.streak : '💀 '+Math.abs(p.streak)}
  `;

  const playerHistory = history.filter(h => h.p1 === name || h.p2 === name).reverse();
  document.getElementById('modalHistory').innerHTML = playerHistory.slice(0, 10).map(h => {
    const won = (h.p1 === name && h.s1 > h.s2) || (h.p2 === name && h.s2 > h.s1);
    return `<li style="padding:4px 0; border-bottom:1px solid #222;">${won ? '🔥' : '💀'} ${h.p1} ${h.s1} - ${h.s2} ${h.p2}</li>`;
  }).join("");

  const timeline = buildTimeline(name);
  const ctx = document.getElementById('eloChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: timeline.map(t => t.label),
      datasets: [{ label: 'Evolución ELO', data: timeline.map(t => t.elo), borderColor: '#00e5ff', tension: 0.3, fill: true, backgroundColor: 'rgba(0,229,255,0.1)' }]
    },
    options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#333' } }, x: { display: false } } }
  });

  document.getElementById('modal').classList.remove("hidden");
}

function buildTimeline(name) {
    let e = 500;
    const tl = [{label: 'Inicio', elo: 500}];
    const matches = history.filter(h => h.p1 === name || h.p2 === name).reverse();
    matches.forEach(h => {
        const win = (h.p1 === name && h.s1 > h.s2) || (h.p2 === name && h.s2 > h.s1);
        const diff = Math.abs(h.s1 - h.s2);
        e = win ? e + (20 + diff * 2) : Math.max(0, e - (15 + diff * 2));
        tl.push({label: 'Pelea', elo: e});
    });
    return tl;
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const nav = document.getElementById('pagination');
  nav.innerHTML = "";
  for(let i=1; i<=pages; i++){
    const b = document.createElement('button');
    b.innerText = i;
    if(i === currentPage) b.className = "active";
    b.onclick = () => { currentPage = i; render(); };
    nav.appendChild(b);
  }
}

function closeModal(){ document.getElementById('modal').classList.add("hidden"); }
document.getElementById('searchRanking').addEventListener('input', () => { currentPage = 1; render(); });
</script>
</body>
</html>
