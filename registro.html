<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro de Guerrero - DBZ BT3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/registro.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="utils/firebase-config.js"></script>
</head>

<body>

    <div class="reg-card">
        <h2>Nuevo Guerrero</h2>
        <p class="instruccion">Completa tus datos para el Ranking</p>

        <input type="text" id="regNombre" placeholder="Nombre de Jugador">

        <select id="regPais">
            <option value="" disabled selected>Selecciona tu país</option>
            <option value="ARGENTINA">Argentina 🇦🇷</option>
            <option value="PERÚ">Perú 🇵🇪</option>
            <option value="PARAGUAY">Paraguay 🇵🇾</option>
            <option value="CHILE">Chile 🇨🇱</option>
            <option value="URUGUAY">Uruguay 🇺🇾</option>
            <option value="BRASIL">Brasil 🇧🇷</option>
            <option value="VENEZUELA">Venezuela 🇻🇪</option>
        </select>

        <input type="password" id="regPin" placeholder="Contraseña (mín. 6 caracteres)">
        <input type="password" id="regPinConf" placeholder="Confirma tu contraseña">

        <button onclick="registrarJugador()">CREAR PERFIL</button>

        <a href="login.html" class="link">¿Ya tienes cuenta? Inicia sesión</a>
    </div>

    <script src="js/registro.js"></script>
</body>

</html>
