<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Perfil de Jugador - DBZ BT3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/perfil.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="utils/firebase-config.js"></script>
    <script src="utils/constants.js"></script>
</head>

<body>
    <div class="container">
        <button class="back-btn" onclick="globalThis.location.href='index.html'">⬅ VOLVER AL RANKING</button>

        <div class="header-perfil">
            <h1 id="pName">Cargando...</h1>
        </div>
        <div class="stats-grid" id="pStats"></div>
        <div class="chart-container">
            <h3 style="margin-top:0; color:var(--primary-gold); font-size: 0.9rem; text-transform: uppercase;">Progreso de Poder (ELO)</h3>
            <canvas id="pChart"></canvas>
        </div>
        <h3 style="border-left: 4px solid var(--primary-gold); padding-left: 10px; text-transform: uppercase; font-size: 1rem;">Bitácora de Batallas</h3>
        <ul id="pHistory" class="history-list"></ul>
        <div id="pPagination" class="pagination"></div>
    </div>

    <script src="js/perfil.js"></script>
</body>

</html>
